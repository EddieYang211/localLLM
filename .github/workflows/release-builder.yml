# --- FILE: .github/workflows/release-builder.yml (v1.3.0 - GPU Support: Vulkan + macOS Intel Metal) ---
name: Build and Release Pre-compiled Libraries

permissions:
  contents: write

on:
  release:
    types: [published]

jobs:
  build:
    name: Build for ${{ matrix.os_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: Linux
            artifact_name: liblocalllm_linux_x64.zip
            lib_name: liblocalllm.so
          - os: ubuntu-latest
            os_name: Linux (Vulkan)
            artifact_name: liblocalllm_linux_x64_vulkan.zip
            lib_name: liblocalllm.so
            vulkan: true
          - os: windows-latest
            os_name: Windows (CPU)
            artifact_name: localllm_windows_x64.zip
            lib_name: localllm.dll
          - os: windows-latest
            os_name: Windows (Vulkan)
            artifact_name: localllm_windows_x64_vulkan.zip
            lib_name: localllm.dll
            vulkan: true
          - os: macos-15-intel
            os_name: macOS (Intel)
            artifact_name: liblocalllm_macos_x64.zip
            lib_name: liblocalllm.dylib
          - os: macos-14
            os_name: macOS (Apple Silicon)
            artifact_name: liblocalllm_macos_arm64.zip
            lib_name: liblocalllm.dylib

    runs-on: ${{ matrix.os }}

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # --- Platform-specific dependency installation ---
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake curl libcurl4-openssl-dev

    # Windows CPU: vcpkg for curl
    - name: Setup vcpkg (Windows CPU)
      if: matrix.os == 'windows-latest' && matrix.vulkan != true
      uses: johnwason/vcpkg-action@v6
      id: vcpkg
      with:
        pkgs: curl
        triplet: x64-windows-static
        token: ${{ github.token }}

    - name: Set vcpkg environment (Windows CPU)
      if: matrix.os == 'windows-latest' && matrix.vulkan != true
      shell: bash
      run: |
        echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV
        echo "VCPKG_CMAKE_PATH=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $GITHUB_ENV

    # Windows Vulkan: install Vulkan SDK via choco (provides headers + vulkan-1.lib for linking)
    # vulkan-1.dll at runtime comes from the user's GPU driver — nothing to bundle
    - name: Install Vulkan SDK (Windows Vulkan)
      if: matrix.vulkan == true && matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        choco install vulkan-sdk -y --no-progress
        $vulkanDir = Get-ChildItem "C:\VulkanSDK" | Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty FullName
        echo "VULKAN_SDK=$vulkanDir" >> $env:GITHUB_ENV
        echo "$vulkanDir\Bin" >> $env:GITHUB_PATH

    # Linux Vulkan: glslc compiles GLSL shaders to SPIR-V at build time
    # libvulkan.so.1 at runtime comes from the user's GPU driver — nothing to bundle
    - name: Install Vulkan SDK (Linux Vulkan)
      if: matrix.vulkan == true && runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y glslc libvulkan-dev spirv-tools

    # --- Inject our custom files ---
    - name: Copy custom files to llama.cpp directory
      shell: bash
      run: |
        cp custom_files/localllm_capi.h backend/llama.cpp/
        cp custom_files/localllm_capi.cpp backend/llama.cpp/
        cp custom_files/CMakeLists.txt.custom backend/llama.cpp/CMakeLists.txt
        cp scripts/check_symbols.sh backend/llama.cpp/
        chmod +x backend/llama.cpp/check_symbols.sh

    # --- Configure and Build ---
    - name: Configure and Build
      shell: bash
      run: |
        cd backend/llama.cpp
        mkdir build && cd build
        mkdir -p bin

        CMAKE_ARGS="-DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF"
        CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_RUNTIME_OUTPUT_DIRECTORY=${PWD}/bin"

        OS_NAME="${{ matrix.os }}"

        if [[ "$OS_NAME" == "windows-latest" && "${{ matrix.vulkan }}" == "true" ]]; then
          # Vulkan build: standard VS generator, just add -DGGML_VULKAN=ON
          CMAKE_ARGS="$CMAKE_ARGS -DGGML_VULKAN=ON"
          CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded"
          # Disable native CPU detection: GHA Azure VMs have AVX-512 but most consumer
          # CPUs do not. Build to AVX2 baseline so the DLL runs on all x86-64 hardware.
          CMAKE_ARGS="$CMAKE_ARGS -DGGML_NATIVE=OFF -DGGML_AVX512=OFF"
          echo "Vulkan GPU build"

        elif [[ "$OS_NAME" == "windows-latest" ]]; then
          # CPU build: VS generator + vcpkg
          CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_TOOLCHAIN_FILE=${VCPKG_CMAKE_PATH} -DVCPKG_TARGET_TRIPLET=x64-windows-static"
          CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded"
          CMAKE_ARGS="$CMAKE_ARGS -DGGML_NATIVE=OFF -DGGML_AVX512=OFF"
          echo "Windows CPU build"

        elif [[ "$OS_NAME" == "macos-15-intel" ]]; then
          CMAKE_ARGS="$CMAKE_ARGS -DLLAMA_ACCELERATE=ON -DGGML_METAL=ON -DGGML_METAL_EMBED_LIBRARY=ON"
          echo "macOS Intel: Metal GPU + Accelerate"

        elif [[ "$OS_NAME" == "macos-14" ]]; then
          CMAKE_ARGS="$CMAKE_ARGS -DLLAMA_ACCELERATE=ON -DGGML_METAL=ON -DGGML_METAL_EMBED_LIBRARY=ON"
          echo "macOS Apple Silicon: Metal GPU"

        elif [[ "$OS_NAME" == "ubuntu-latest" && "${{ matrix.vulkan }}" == "true" ]]; then
          CMAKE_ARGS="$CMAKE_ARGS -DGGML_VULKAN=ON"
          CMAKE_ARGS="$CMAKE_ARGS -DGGML_NATIVE=OFF -DGGML_AVX512=OFF"
          echo "Linux: Vulkan GPU build"

        else
          CMAKE_ARGS="$CMAKE_ARGS -DLLAMA_ACCELERATE=ON"
          CMAKE_ARGS="$CMAKE_ARGS -DGGML_NATIVE=OFF -DGGML_AVX512=OFF"
          echo "Linux: CPU build"
        fi

        echo "Configuring: cmake .. $CMAKE_ARGS"
        cmake .. $CMAKE_ARGS

        echo "Building target 'localllm'..."
        cmake --build . --config Release --target localllm --parallel

    # --- GLUE-CODE ARCHITECTURE: Verify static library symbol completeness ---
    - name: Verify Static Library Symbols
      shell: bash
      run: |
        cd backend/llama.cpp
        echo "Running symbol verification (${{ matrix.os_name }})..."
        if ./check_symbols.sh build; then
          echo "Static libraries complete - glue-code architecture verified."
        else
          echo "Some symbols missing — OBJECT library fallback handled this during build."
        fi

    # --- Package and Upload ---
    - name: Package the artifact
      shell: bash
      run: |
        mkdir -p staging/lib

        echo "Searching for compiled library..."
        find backend/llama.cpp/build -name "*localllm*" -type f

        # Locate the compiled library
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          for CANDIDATE in \
            "backend/llama.cpp/build/bin/Release/${{ matrix.lib_name }}" \
            "backend/llama.cpp/build/bin/${{ matrix.lib_name }}" \
            "backend/llama.cpp/build/Release/${{ matrix.lib_name }}" \
            "backend/llama.cpp/build/${{ matrix.lib_name }}"
          do
            if [[ -f "$CANDIDATE" ]]; then LIB_PATH="$CANDIDATE"; break; fi
          done
          if [[ -z "$LIB_PATH" ]]; then
            echo "Cannot find Windows library"; find backend/llama.cpp/build -name "*.dll"; exit 1
          fi
        else
          for CANDIDATE in \
            "backend/llama.cpp/build/bin/${{ matrix.lib_name }}" \
            "backend/llama.cpp/build/${{ matrix.lib_name }}" \
            "backend/llama.cpp/build/lib${{ matrix.lib_name }}"
          do
            if [[ -f "$CANDIDATE" ]]; then LIB_PATH="$CANDIDATE"; break; fi
          done
          if [[ -z "$LIB_PATH" ]]; then
            echo "Cannot find Unix library"; find backend/llama.cpp/build -name "*.so" -o -name "*.dylib"; exit 1
          fi
        fi

        echo "Library: $LIB_PATH"
        cp "$LIB_PATH" staging/lib/

        # Vulkan: GPU runtime library ships with every modern GPU driver — nothing to bundle.
        # A note is included so users know the GPU requirement.
        if [[ "${{ matrix.vulkan }}" == "true" ]]; then
          printf '%s\n' \
            "This build requires a Vulkan-capable GPU driver (NVIDIA, AMD, or Intel Arc)." \
            "Windows: vulkan-1.dll is provided by your GPU driver." \
            "Linux: libvulkan.so.1 is provided by your GPU driver or mesa-vulkan-drivers." \
            "Supported: NVIDIA GeForce 10xx+, AMD RX 400+, Intel Arc." \
            > staging/GPU_REQUIREMENTS.txt
        fi

        echo "Creating ${{ matrix.artifact_name }}"
        cd staging
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          powershell -Command "Compress-Archive -Path * -DestinationPath '../${{ matrix.artifact_name }}'"
        else
          zip -r ../${{ matrix.artifact_name }} .
        fi
        cd ..

    - name: Upload Artifact to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./${{ matrix.artifact_name }}
        asset_name: ${{ matrix.artifact_name }}
        asset_content_type: application/zip
